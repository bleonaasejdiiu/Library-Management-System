name: Library Management System - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: universal_library
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Import Database Schema
        run: mysql -h 127.0.0.1 -u root -proot universal_library < database.sql

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Create Backend .env
        working-directory: ./backend
        run: |
          echo "DB_HOST=127.0.0.1" > .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "DB_NAME=universal_library" >> .env
          echo "JWT_SECRET=sekret_i_perkohshem" >> .env
          echo "PORT=5000" >> .env

      - name: Start Backend
        working-directory: ./backend
        run: npm start &

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60
        env:
          CYPRESS_baseUrl: http://localhost:3000

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
